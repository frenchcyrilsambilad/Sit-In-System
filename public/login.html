<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCS | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
  <style>
    /* Prevent image overflow issues */
    .brand-panel img {
        max-width: 100%;
        height: auto;
    }
  </style>
</head>
<body class="login-page">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark login-navbar">
    <a class="navbar-brand login-brand" href="index.html">
      College of Computer Studies Sit-in Monitoring System
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto login-nav-links align-items-lg-center">
        <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">Community <i class="fa fa-caret-down"></i></a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link login-active" href="login.html">Login</a></li>
        <li class="nav-item"><a class="nav-link register-pill" href="registration.html">Register</a></li>
      </ul>
    </div>
  </nav>

  <!-- Login wrapper -->
  <main class="login-wrapper">
    <section class="login-card">

      <!-- Brand panel -->
      <div class="brand-panel">
        <img class="ccs-login-logo" src="static/ccslogo.png" alt="UC CCS Logo" onerror="this.src='../images/logo.png'; this.onerror=null;"/>
      </div>

      <!-- Form panel -->
      <div class="form-panel">
        <div class="login-logo-block">
          <img class="uc-login-logo" src="static/uclogo.png" alt="UC Logo" onerror="this.src='../images/UC_LOGO.png'; this.onerror=null;" />
          <p>Login into your account</p>
        </div>

        <form id="login-form" class="login-form" onsubmit="event.preventDefault(); handleLogin();">
          <div id="login-error" class="login-error"></div>

          <div class="login-field">
            <label for="login-id" class="form-label">ID Number :</label>
            <div class="login-input-group">
              <input type="text" class="form-control" id="login-id" name="login-id" placeholder="Enter a valid ID number" required />
              <span class="input-group-text">
                <i class="fa-solid fa-id-card"></i>
              </span>
            </div>
          </div>

          <div class="login-field password-field">
            <label for="login-pass" class="form-label">Password</label>
            <div class="login-input-group">
                <input type="password" class="form-control" id="login-pass" name="login-pass" placeholder="Enter your password" required />
                <span class="input-group-text" onclick="togglePass('login-pass', this)">
                    <i class="fa fa-lock"></i>
                </span>
            </div>
          </div>

          <div class="forgot-row">
            <a href="#" class="forgot-link" onclick="document.getElementById('login-error').style.display='block'; document.getElementById('login-error').style.background='#e0f2fe'; document.getElementById('login-error').style.borderColor='#7dd3fc'; document.getElementById('login-error').style.color='#0369a1'; document.getElementById('login-error').innerHTML='<i class=\'fa-solid fa-circle-info\'></i> Please contact the CCS Lab Administrator in Room 524 to reset your password.'; event.preventDefault();">Forgot password?</a>
          </div>

          <button type="submit" class="btn login-submit">Login now</button>
          
          <div class="login-divider">
            <span></span>
            <strong>OR</strong>
            <span></span>
          </div>
          
          <a href="registration.html" class="btn signup-button">Signup now</a>
        </form>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js?v=26"></script>
</body>
</html>
