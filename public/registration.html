<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCS | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
  <style>
    /* ── Password wrapper ── */
    .pw-wrap {
      position: relative;
    }
    .pw-wrap .form-control {
      padding-right: 2.6rem;
    }
    .pw-toggle {
      position: absolute;
      right: .75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: #6c757d;
      font-size: .9rem;
      line-height: 1;
      z-index: 5;
      transition: color .15s;
    }
    .pw-toggle:hover {
      color: #343a40;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark px-4" style="background:var(--nav-bg)!important;">
    <a class="navbar-brand fw-semibold d-flex align-items-center" href="index.html" style="font-size:.9rem; text-decoration: none;">
      <img src="static/uclogo.png" alt="UC Logo" class="nav-logo me-2" onerror="this.src='../images/UC_LOGO.png'; this.onerror=null;"/>
      College of Computer Studies Sit-in Monitoring System
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
        <li class="nav-item"><a class="nav-link active" href="registration.html">Register</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main -->
  <div class="d-flex justify-content-center align-items-start py-4 px-3 register-wrapper">
    <div class="register-card bg-white">
      <!-- Header -->
      <div class="card-header-ccs d-flex align-items-center justify-content-between">
        <div>
          <h1 class="mb-1">Create your account</h1>
          <p>Fill in your details to get started with the sit-in system</p>
        </div>
        <a href="login.html" class="btn-back">← Back</a>
      </div>

      <!-- Body -->
      <div class="p-4 p-md-5">
        <div id="reg-error" style="display:none; background:#fee2e2; border:1px solid #fca5a5; color:#991b1b; border-radius:7px; padding:.55rem .85rem; font-size:.82rem; font-weight:500; margin-bottom:1rem;"></div>
        <div id="reg-success" style="display:none; background:#dcfce7; border:1px solid #86efac; color:#166534; border-radius:7px; padding:.55rem .85rem; font-size:.82rem; font-weight:500; margin-bottom:1rem;"></div>
        
        <form id="register-form" onsubmit="event.preventDefault(); handleRegister();">
          <!-- Personal Info -->
          <p class="section-heading">Personal Information</p>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="reg-id" class="form-label">ID Number</label>
              <input type="text" class="form-control" id="reg-id" name="idNumber" placeholder="e.g. 20-1234-567" required/>
            </div>
            <div class="col-md-6">
              <label for="reg-email" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="reg-email" name="email" placeholder="you@example.com" required/>
            </div>
            <div class="col-md-4">
              <label for="reg-lastname" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="reg-lastname" name="lastName" placeholder="Dela Cruz" required/>
            </div>
            <div class="col-md-4">
              <label for="reg-firstname" class="form-label">First Name</label>
              <input type="text" class="form-control" id="reg-firstname" name="firstName" placeholder="Juan" required/>
            </div>
            <div class="col-md-4">
              <label for="reg-middlename" class="form-label">
                Middle Name <span class="text-muted fw-normal" style="font-size:.7rem;">(optional)</span>
              </label>
              <input type="text" class="form-control" id="reg-middlename" name="middleName" placeholder="Santos"/>
            </div>
            <div class="col-12">
              <label for="reg-address" class="form-label">Address</label>
              <input type="text" class="form-control" id="reg-address" name="address" placeholder="City, Province" required/>
            </div>
          </div>

          <!-- Academic Details -->
          <p class="section-heading">Academic Details</p>
          <div class="row g-3">
            <div class="col-md-8">
              <label for="reg-course" class="form-label">Course</label>
              <select class="form-select" id="reg-course" name="course" required>
                <option value="" disabled selected>Choose your course</option>
                <option value="BSIT">BSIT — Information Technology</option>
                <option value="BSCS">BSCS — Computer Science</option>
                <option value="BSE">BSE — Engineering</option>
                <option value="BSN">BSN — Nursing</option>
                <option value="BSA">BSA — Accountancy</option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="reg-level" class="form-label">Year Level</label>
              <select class="form-select" id="reg-level" name="courseLevel" required>
                <option value="" disabled selected>Select year</option>
                <option value="1">1st Year</option>
                <option value="2">2nd Year</option>
                <option value="3">3rd Year</option>
                <option value="4">4th Year</option>
                <option value="5">5th Year</option>
              </select>
            </div>
          </div>

          <!-- Security -->
          <p class="section-heading">Security</p>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="reg-pass" class="form-label">Password</label>
              <div class="pw-wrap">
                <input type="password" class="form-control" id="reg-pass" name="password" placeholder="Min. 6 characters" required/>
                <button type="button" class="pw-toggle" onclick="togglePassword('reg-pass', this)" tabindex="-1" aria-label="Show password">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="col-md-6">
              <label for="reg-pass2" class="form-label">Confirm Password</label>
              <div class="pw-wrap">
                <input type="password" class="form-control" id="reg-pass2" name="repeatPassword" placeholder="Repeat your password" required/>
                <button type="button" class="pw-toggle" onclick="togglePassword('reg-pass2', this)" tabindex="-1" aria-label="Show confirm password">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- Footer -->
          <div class="form-footer d-flex align-items-center justify-content-between flex-wrap gap-3 mt-4 pt-3 border-top">
            <p class="signin-hint mb-0" style="font-size: .88rem; color: #6b7280;">Already have an account? <a href="login.html" style="color: #1a3a8f; font-weight: 600; text-decoration: none;">Sign in here</a></p>
            <button type="submit" class="btn btn-ccs text-white" style="background: linear-gradient(135deg,#0f2463,#1a3a8f); border-radius: 8px; padding: .6rem 1.2rem; font-weight: 600;">Create Account →</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js?v=26"></script>
  <script>
    function togglePassword(fieldId, btn) {
      const input = document.getElementById(fieldId);
      const icon  = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }
  </script>
</body>
</html>
